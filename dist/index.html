 <style>
  :root {
   --bg-primary: #fcfdfe;
   --card-bg: rgba(255, 255, 255, 0.6);
  }

  .dark {

   --card-bg: rgba(15, 23, 42, 0.6);
  }

  }

  html,

  .hero-gradient {

  }

  ::-webkit-scrollbar {
   width: 6px;
  }

  ::-webkit-scrollbar-track {
   background: transparent;
  }

  ::-webkit-scrollbar-thumb {
   background: #cbd5e1;
   border-radius: 10px;
  }

  .dark ::-webkit-scrollbar-thumb {
   background: #334155;
  }

   -webkit-overflow-scrolling: touch;
  }
